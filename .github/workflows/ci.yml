name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: unit tests (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package with optional codecs
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[all]'
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  verify:
    name: evidence + compile smoke verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install package with optional codecs
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[all]'
      - name: Verify handoff evidence manifest
        run: python tools/verify_handoff.py
      - name: Compile probe suite with the clean-room actool
        run: |
          python tools/make_probe_suite.py "$RUNNER_TEMP/probe-suite"
          PYTHONPATH=src python tools/run_ours_matrix.py "$RUNNER_TEMP/probe-suite" "$RUNNER_TEMP/ours-out"
      - name: Every generated CAR must parse
        run: |
          PYTHONPATH=src python - "$RUNNER_TEMP/ours-out" <<'PY'
          import sys
          from pathlib import Path
          from actool_linux.carinfo import inspect
          cars = sorted(Path(sys.argv[1]).rglob('*.car'))
          if not cars:
              raise SystemExit('no CAR files were produced')
          bad = []
          for car in cars:
              try:
                  info = inspect(car)
                  print(f"PARSE_OK {car.parent.name}/{car.name} sections={len(info)}")
              except Exception as exc:  # noqa: BLE001 - report all failures
                  bad.append((car, exc))
          for car, exc in bad:
              print(f"PARSE_FAIL {car}: {exc}")
          if bad:
              raise SystemExit(1)
          print(f'{len(cars)} CAR files parsed successfully')
          PY
      - name: Public fixture CARs must parse
        run: |
          PYTHONPATH=src python - <<'PY'
          from pathlib import Path
          from actool_linux.carinfo import inspect
          cars = sorted(Path('public-fixtures').rglob('*.car')) + sorted(Path('fixtures').rglob('*.car'))
          if not cars:
              raise SystemExit('fixture CARs missing')
          for car in cars:
              info = inspect(car)
              print(f"FIXTURE_OK {car} sections={len(info)}")
          print(f'{len(cars)} fixture CAR files parsed successfully')
          PY

  oracle-matrix:
    name: Apple actool oracle matrix (macOS)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install actool-linux
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e '.[all]'
      - name: Toolchain versions
        run: |
          xcodebuild -version
          xcrun actool --version || true
      - name: Compile suite with Apple actool and with actool-linux
        run: |
          python3 tools/make_probe_suite.py "$RUNNER_TEMP/probe-suite"
          PYTHONPATH=src python3 tools/run_apple_matrix.py "$RUNNER_TEMP/probe-suite" "$RUNNER_TEMP/apple-out"
          PYTHONPATH=src python3 tools/run_ours_matrix.py "$RUNNER_TEMP/probe-suite" "$RUNNER_TEMP/ours-out"
      - name: Diff Apple vs clean-room outputs
        run: |
          PYTHONPATH=src python3 - <<'PY'
          import json, subprocess, sys
          from pathlib import Path
          apple = Path(__import__('os').environ['RUNNER_TEMP']) / 'apple-out'
          ours = Path(__import__('os').environ['RUNNER_TEMP']) / 'ours-out'
          report_dir = Path('oracle-report')
          report_dir.mkdir(exist_ok=True)
          summary = {}
          for acar in sorted(apple.rglob('*.car')):
              case = acar.parent.name
              ocar = ours / case / acar.name
              if not ocar.is_file():
                  summary[case] = {'missing_ours': True}
                  continue
              out = report_dir / f'{case}.json'
              proc = subprocess.run(
                  [sys.executable, 'tools/diff_cars.py', str(acar), str(ocar), '--json', str(out)],
                  capture_output=True)
              summary[case] = {'mismatch_count': json.loads(out.read_text())['mismatch_count']}
          (report_dir / 'summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n')
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY
      - name: Upload oracle diff report
        uses: actions/upload-artifact@v4
        with:
          name: oracle-report
          path: oracle-report/
          retention-days: 30
