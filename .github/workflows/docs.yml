name: Documentation CI/CD (mdBook & Rustdoc)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        run: |
          mkdir -p $HOME/.bin
          curl -sL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/.bin/
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Generate Rustdoc API Documentation
        run: cargo doc --workspace --no-deps

      - name: Build mdBook Documentation Site
        run: mdbook build wiki/

      - name: Merge Rustdoc into mdBook Output
        run: |
          mkdir -p wiki/book_html/rustdoc
          cp -r target/doc/* wiki/book_html/rustdoc/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Documentation Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki/book_html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
