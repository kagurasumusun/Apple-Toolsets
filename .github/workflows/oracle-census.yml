# Apple-actool oracle census on a GitHub-hosted macOS runner.
#
# Regenerates every probe suite, compiles it with the real Apple actool and
# with actool-linux, then classifies the pairs (exact / hash16 / payload /
# struct) via tools/oracle_census.py and commits the report to
# research/oracle-census/. Fails on any struct/missing divergence (regression
# alarm) while payload/hash16 residuals are tracked for the fix campaign.
#
# Auto-triggers when the encoder/writer sources change; also manual dispatch.
name: Oracle census (Apple actool)

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/actool_linux/**'
      - 'tools/oracle_census.py'
      - 'tools/make_probe*.py'
      - '.github/workflows/oracle-census.yml'

permissions:
  contents: write

jobs:
  census:
    name: Compile probe suites with Apple actool + actool-linux and classify
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install actool-linux
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e '.[all]'

      - name: Toolchain identity
        run: |
          sw_vers
          xcodebuild -version

      - name: Compile all probe suites (Apple actool and clean-room)
        run: |
          set -e
          SUITES="$RUNNER_TEMP/suites"
          mkdir -p "$SUITES"
          python3 tools/make_probe_suite.py "$SUITES/probe-basic"
          python3 tools/make_probe3.py     "$SUITES/probe3"
          python3 tools/make_probe4.py     "$SUITES/probe4"
          python3 tools/make_probe5.py     "$SUITES/probe5"
          python3 tools/make_probe6.py     "$SUITES/probe6"
          for suite in probe-basic probe3 probe4 probe5 probe6; do
            PYTHONPATH=src python3 tools/run_apple_matrix.py "$SUITES/$suite" "$RUNNER_TEMP/apple/$suite" || echo "apple matrix partial: $suite"
            PYTHONPATH=src python3 tools/run_ours_matrix.py  "$SUITES/$suite" "$RUNNER_TEMP/ours/$suite"
          done

      - name: Census per suite; fail on struct/missing
        run: |
          set -e
          mkdir -p research/oracle-census
          rc=0
          for suite in probe-basic probe3 probe4 probe5 probe6; do
            echo "=== $suite"
            PYTHONPATH=src python3 tools/oracle_census.py \
              "$RUNNER_TEMP/apple/$suite" "$RUNNER_TEMP/ours/$suite" \
              --json "research/oracle-census/$suite.json" || rc=1
          done
          exit $rc

      - name: Upload census reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-census
          path: research/oracle-census/
          retention-days: 90

      - name: Commit census reports
        if: always()
        run: |
          git config user.name 'actool-linux-census-bot'
          git config user.email 'actool-linux-census-bot@users.noreply.github.com'
          git add research/oracle-census/
          if git diff --cached --quiet; then
            echo 'census unchanged'
          else
            git commit -m "research: oracle census refresh (Apple actool vs actool-linux)

            run ${GITHUB_RUN_ID} on $(sw_vers -productName) $(sw_vers -productVersion) / $(xcodebuild -version | head -1)"
            git push origin HEAD:actool
          fi
