# One-shot workflow: generate self-made public CAR fixtures on a GitHub-hosted
# macOS runner and commit them back to the repository.
#
# Triggering model: fires automatically when this file (or the generator tool)
# is pushed, plus manual dispatch. After the generated fixtures are collected,
# this workflow is meant to be deleted again (it exists only to produce the
# committed artifacts once).
name: Generate self-made public fixtures

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/generate-fixtures.yml'
      - 'tools/make_public_fixtures.py'

permissions:
  contents: write

jobs:
  generate:
    name: Build fixtures with Apple actool and commit them
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install actool-linux
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e '.[all]'

      - name: Toolchain identity
        run: |
          sw_vers
          xcodebuild -version
          xcrun actool --version || true

      - name: Generate self-authored source catalogs
        run: python3 tools/make_public_fixtures.py "$RUNNER_TEMP/fixture-suite"

      - name: Compile suite with Apple actool
        run: PYTHONPATH=src python3 tools/run_apple_matrix.py "$RUNNER_TEMP/fixture-suite" "$RUNNER_TEMP/apple-out"

      - name: Stage generated fixtures
        run: |
          cp "$RUNNER_TEMP/apple-out/selfgen-rich/Assets.car" fixtures/selfgen-rich-Assets.car
          cp "$RUNNER_TEMP/apple-out/selfgen-brand/Assets.car" fixtures/selfgen-stacks-Assets.car
          PYTHONPATH=src python3 tools/make_public_fixtures.py --emit-solidstack-demo fixtures/selfgen-solidstack-demo.car
          mkdir -p fixtures/report
          xcrun assetutil --info fixtures/selfgen-rich-Assets.car   > fixtures/report/selfgen-rich.assetutil.json
          xcrun assetutil --info fixtures/selfgen-stacks-Assets.car > fixtures/report/selfgen-stacks.assetutil.json
          xcrun assetutil --info fixtures/selfgen-solidstack-demo.car > fixtures/report/selfgen-solidstack-demo.assetutil.json

      - name: Validate fixtures (clean-room parser + Apple ground truth)
        run: |
          PYTHONPATH=src python3 - <<'PY'
          import json
          from pathlib import Path
          from actool_linux.bom import BOMStore
          from actool_linux.car import CARFile

          # 1) selfgen-rich must carry Aqua/DarkAqua appearance registry entries.
          car = CARFile(BOMStore.from_path('fixtures/selfgen-rich-Assets.car'))
          registry = {e.name: e.value for e in car.appearances}
          assert 'NSAppearanceNameAqua' in registry, registry
          assert 'NSAppearanceNameDarkAqua' in registry, registry
          print('appearance registry:', json.dumps(registry, sort_keys=True))

          # 2) Apple assetutil ground truth must recognize the stack layouts.
          for name, marker in (('selfgen-stacks', 'ImageStack'),
                               ('selfgen-solidstack-demo', 'Stack')):
              text = Path(f'fixtures/report/{name}.assetutil.json').read_text()
              assert marker in text, (name, text[:400])
              print(f'{name}: Apple assetutil recognized marker {marker!r}')
          print('FIXTURE_VALIDATION_OK')
          PY

      - name: Write provenance document
        run: |
          {
            echo '# SELF-GENERATED fixtures (provenance)'
            echo
            echo "date (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "runner: $(sw_vers -productName) $(sw_vers -productVersion)"
            xcodebuild -version | sed 's/^/toolchain: /'
            echo
            echo 'All inputs were generated by tools/make_public_fixtures.py from'
            echo 'self-authored deterministic sources (no Apple/third-party artwork).'
            echo
            for f in fixtures/selfgen-rich-Assets.car fixtures/selfgen-stacks-Assets.car fixtures/selfgen-solidstack-demo.car; do
              echo "- $f"
              echo "    sha256: $(shasum -a 256 "$f" | awk '{print $1}')"
              echo "    bytes:  $(stat -f %z "$f")"
            done
          } > fixtures/SELF-GENERATED.md
          cat fixtures/SELF-GENERATED.md

      - name: Upload fixtures as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selfgen-fixtures
          path: |
            fixtures/selfgen-rich-Assets.car
            fixtures/selfgen-stacks-Assets.car
            fixtures/selfgen-solidstack-demo.car
            fixtures/report/
            fixtures/SELF-GENERATED.md
          retention-days: 90

      - name: Commit fixtures back to the branch
        run: |
          git config user.name 'actool-linux-fixture-bot'
          git config user.email 'actool-linux-fixture-bot@users.noreply.github.com'
          git add fixtures/
          if git diff --cached --quiet; then
            echo 'no fixture changes; skipping commit'
          else
            git commit -m "fixtures: self-made public fixtures generated on GitHub-hosted macOS runner

            selfgen-rich-Assets.car / selfgen-stacks-Assets.car compiled with Apple actool
            from tools/make_public_fixtures.py sources; selfgen-solidstack-demo.car emitted
            by the clean-room writer; Apple assetutil parse reports + provenance included."
            git push origin HEAD:actool
          fi
